                if (id === state.activeId) renderOutput(id);
              }
            }
            for (const evt of event.events || [])
              handleEvent(id, { ...evt, replay: true });
            if (id === state.activeId) {
              renderToolsTab(id);
              renderFilesTab(id);
              updateTabBadges(id);
              scrollBottom();
            }
            break;
          }

          case "user_message": {
            finalizeStream(id);
            // Only show follow-up messages; the initial task message is shown in the TASK block
            if (convo.nodes.length > 0)
              appendNode(id, makeFollowupNode(event.text));
            break;
          }

          case "user_message_queued": {
            finalizeStream(id);
            appendNode(id, makeQueuedNode(event.text));
            if (!event.replay) {
              state.queuedCount[id] = (state.queuedCount[id] || 0) + 1;
              renderSidebar();
              updateFollowupBtn();
            }
            break;
          }

          case "chunk": {
            convo.pendingText += event.text;
            // Update live stream clip text + sources label
            if (!event.replay) {
              const tl = tlFor(id);
              for (let i = tl.events.length - 1; i >= 0; i--) {
                if (tl.events[i].type === "stream_live") {
                  tl.events[i].data.text =
                    (tl.events[i].data.text || "") + event.text;
                  tl.events[i].data.sources = [..._tlCurrentSources(id)];
                  _tlUpdateClip(id, i);
                  break;
                }
              }
            }
            break;
          }

          case "thinking": {
            finalizeStream(id);
            appendNode(id, makeThinkBlock(event.text));
            break;
          }

          case "tool_use": {
            finalizeStream(id);
            const block = makeToolBlock(event.name, event.params);
            state.activeToolBlocks[id] = block;
            appendNode(id, block);
            trackToolUse(id, event.name, event.params);
            trackFileOp(id, event.name, event.params);
            // Register as knowledge source for the current generation
            if (!event.replay) {
              _tlCurrentSources(id).push({
                type: "tool",
                name: event.name,
                params: event.params,
              });
              // Refresh stream_live clip to show updated source count
              const tl = tlFor(id);
              for (let i = tl.events.length - 1; i >= 0; i--) {
                if (tl.events[i].type === "stream_live") {
                  tl.events[i].data.sources = [..._tlCurrentSources(id)];
                  _tlUpdateClip(id, i);
                  break;
                }
              }
            }
            break;
          }

          case "tool_result": {
            const block = state.activeToolBlocks[id];
            if (block) {
              attachToolResult(block, event.name, event.result);
              scrollBottom();
            }
            trackToolResult(id, event.name, event.result);
            break;
          }

          case "llm_start": {
            if (!event.replay) {
              _attachGenRow(id);
              // Start a live streaming clip in the timeline
              state.taskCurrentSources[id] = [];
              addTimelineEvent(id, "stream_live", {
                text: "",
                sources: [],
                active: true,
              });
            }
            break;
          }

          case "activity": {
            if (!event.replay) {
              if (id === state.activeId && event.hint)
                document.getElementById("activity-hint").textContent =
                  event.hint;
              genAddActivity(id, event.hint);
            }
            break;
          }

          case "tokens": {
            if (event.input) convo.inputTokens = event.input;
            if (event.output) convo.outputTokens = event.output;
            break;
          }

          case "info": {
            if (!event.text?.trim()) break;
            const el = document.createElement("div");
            el.style.cssText =
              "font-size:11.5px;color:#444;padding:2px 2px;font-family:monospace";
            el.textContent = event.text;
            appendNode(id, el);
            break;
          }

          case "bash_line": {
            const block = state.activeToolBlocks[id];
            if (block) {
              let res = block.querySelector(".tool-result-text");
              if (!res) {
                const lbl = document.createElement("div");
                lbl.className = "tool-result-label";
                lbl.textContent = "Output";
                res = document.createElement("div");
                res.className = "tool-result-text";
                block.querySelector(".tool-body").append(lbl, res);
              }
              res.textContent +=
                (event.is_stderr ? "[err] " : "") + event.line + "\n";
            }
            break;
          }

          case "confirm_request": {
            finalizeStream(id);
            if (event.replay && event.resolved) {
              const note = document.createElement("div");
              note.style.cssText =
                "font-size:12px;color:var(--muted);padding:4px 2px";
              note.textContent = event.allowed
                ? "✓ Tool allowed"
                : "✗ Tool denied";
              appendNode(id, note);
            } else {
              appendNode(id, makeConfirmBlock(id, event.name, event.params));
            }
            break;
          }

          case "ask_user": {
            finalizeStream(id);
            if (event.replay && event.answered) {
              // Show answered state: question + answer
              const q = document.createElement("div");
              q.style.cssText =
                "font-size:12.5px;color:var(--muted);padding:4px 2px;font-style:italic";
              q.textContent = "❓ " + event.question;
              appendNode(id, q);
              appendNode(id, makeFollowupNode(event.answer));
            } else {
              state.waitingInput[id] = true;
              renderSidebar();
              updateTitle();
              if (id === state.activeId) updateTopbar();
              if (!event.replay) {
                playNotification();
                if (id !== state.activeId) {
                  let n = 0;
                  const t = setInterval(() => {
                    document.title =
                      n++ % 2 === 0
                        ? "🔔 Input required — Zup Tasks"
                        : updateTitle() || document.title;
                    if (n >= 6) clearInterval(t);
                  }, 700);
                }
              }
              appendNode(id, makeAskBlock(id, event.question, event.options));
            }
            break;
          }

          case "response": {
            removeGenRow(id);
            convo.pendingText = "";
            finalizeStream(id);
            appendNode(id, makeResponseNode(event.text));
            if (id === state.activeId)
              document.getElementById("activity-hint").textContent = "";
            // Promote stream_live → response with captured sources
            if (!event.replay) {
              const sources = [..._tlCurrentSources(id)];
              state.taskCurrentSources[id] = [];
              const tl = tlFor(id);
              let promoted = false;
              for (let i = tl.events.length - 1; i >= 0; i--) {
                if (tl.events[i].type === "stream_live") {
                  tl.events[i].type = "response";
                  tl.events[i].data = { ...event, sources };
                  _tlUpdateClip(id, i);
                  promoted = true;
                  break;
                }
              }
              if (!promoted)
                addTimelineEvent(id, "response", { ...event, sources });
            }
            break;
          }

          case "error": {
            removeGenRow(id);
            finalizeStream(id);
            const el = document.createElement("div");
            el.style.cssText =
              "color:var(--error);font-size:12.5px;padding:8px 12px;border:1px solid #5a1a1a;border-radius:8px;background:#1a0a0a";
            el.textContent = "⚠ " + event.message;
            appendNode(id, el);
            break;
          }

          case "done": {
            removeGenRow(id);
            if (convo.pendingText && convo.pendingText.trim()) {
              appendNode(id, makeResponseNode(convo.pendingText));
              convo.pendingText = "";
            }
            finalizeStream(id);
            state.queuedCount[id] = 0;
            updateFollowupBtn();
            break;
          }
        }

        if (["done", "error", "response"].includes(event.type)) refreshTask(id);
      }

      function finalizeStream(id) {
        const convo = convoFor(id);
        if (!convo.streamNode) return;
        const raw = convo.streamNode.textContent;
        convo.streamNode.className = "msg-response md";
        convo.streamNode.style.cssText = "";
        convo.streamNode.innerHTML = raw.trim() ? marked.parse(raw) : "";
        convo.streamNode = null;
      }

      // ═══════════════════════════════════════════════════════════════════
      // Task management
      // ═══════════════════════════════════════════════════════════════════
      async function createTask() {
        const agent =
          document.getElementById("agent-input").value.trim() || "@auto";
        const desc = document.getElementById("task-desc-input").value.trim();
        const name =
          document.getElementById("task-name-input").value.trim() ||
          desc.split("\n")[0].slice(0, 60) ||
          "Task";
        if (!desc) {
          document.getElementById("task-desc-input").focus();
          return;
        }
        closeModal();

        try {
          const s = await api("POST", "/sessions", { name });
          state.tasks[s.id] = s;
          state.taskDescs[s.id] = desc;
          renderSidebar();
          selectTask(s.id);
          ensureSocket(s.id);

          setTimeout(async () => {
            const message = agent.startsWith("@") ? `${agent} ${desc}` : desc;
            try {
              await api("POST", `/sessions/${s.id}/message`, { message });
              state.tasks[s.id].status = "running";
              renderSidebar();
              updateTopbar();
              updateFollowupBtn();
            } catch (e) {
              console.error("Start task failed:", e);
            }
          }, 250);
        } catch (e) {
          alert("Failed to create task: " + e.message);
        }
      }

      async function deleteTask(id) {
        if (!confirm("Delete this task?")) return;
        try {
          await api("DELETE", `/sessions/${id}`);
          const ws = state.sockets[id];
          if (ws) ws.close();
          tlStopPlay(id);
          delete state.tasks[id];
          delete state.sockets[id];
          delete state.taskConvos[id];
          delete state.taskDescs[id];
          delete state.waitingInput[id];
          delete state.taskTools[id];
          delete state.taskFiles[id];
          delete state.activeFile[id];
          delete state.taskTimeline[id];
          delete state.taskCurrentSources[id];
          if (state.activeId === id) {
            state.activeId = null;
            document.getElementById("task-view").style.display = "none";
            document.getElementById("no-task").style.display = "flex";
          }
          renderSidebar();
        } catch (e) {
          alert("Delete failed: " + e.message);
        }
      }

      async function refreshTask(id) {
        try {
          const s = await api("GET", `/sessions/${id}`);
          state.tasks[id] = { ...state.tasks[id], ...s };
          renderSidebar();
          if (id === state.activeId) updateTopbar();
        } catch (_) {}
      }

      async function loadTasks() {
        try {
          const list = await api("GET", "/sessions");
          for (const s of list) {
            state.tasks[s.id] = s;
            ensureSocket(s.id);
          }
          renderSidebar();
        } catch (e) {
          console.error("Load tasks failed:", e);
        }
      }

      async function stopTask() {
        const id = state.activeId;
        if (!id) return;
        try {
          await api("POST", `/sessions/${id}/stop`);
          document.getElementById("btn-stop").classList.remove("visible");
        } catch (e) {
          console.error("Stop failed:", e);
        }
      }

      // ═══════════════════════════════════════════════════════════════════
      // Follow-up / send message
      // ═══════════════════════════════════════════════════════════════════
      async function sendFollowup() {
        const id = state.activeId;
        if (!id) return;
        const input = document.getElementById("followup-input");
        const text = input.value.trim();
        if (!text) return;
        input.value = "";
        autoResize(input);

        try {
          const result = await api("POST", `/sessions/${id}/message`, {
            message: text,
          });
          if (result.status === "queued") {
            // Will show as queued via WS event
          } else {
            state.tasks[id].status = "running";
            renderSidebar();
            updateTopbar();
            updateFollowupBtn();
          }
        } catch (e) {
          alert("Send failed: " + e.message);
        }
      }

      function updateFollowupBtn() {
        const id = state.activeId;
        const btn = document.getElementById("btn-followup");
        const qc = document.getElementById("queued-count");
        const inp = document.getElementById("followup-input");
        const running = id && state.tasks[id]?.status === "running";
        const queued = id && (state.queuedCount[id] || 0);

        btn.disabled = !id;
        if (running && queued) {
          btn.textContent = "Queue";
          btn.className = "queued";
          btn.disabled = false;
          qc.textContent = `${queued} queued`;
          qc.style.display = "";
          inp.classList.add("queued-mode");
          inp.placeholder = "Queue a message…";
        } else if (running) {
          btn.textContent = "Queue";
          btn.className = "";
          qc.style.display = "none";
          inp.classList.remove("queued-mode");
          inp.placeholder = "Queue a message for after current run…";
        } else {
          btn.textContent = "Send";
          btn.className = "";
          qc.style.display = "none";
          inp.classList.remove("queued-mode");
          inp.placeholder = "Send a message or follow up…";
        }
      }

      function autoResize(ta) {
        ta.style.height = "auto";
        ta.style.height = Math.min(ta.scrollHeight, 120) + "px";
      }

      // ═══════════════════════════════════════════════════════════════════
      // Modal
      // ═══════════════════════════════════════════════════════════════════
      function openModal() {
        document.getElementById("modal-overlay").classList.add("open");
        setTimeout(
          () => document.getElementById("task-desc-input").focus(),
          50,
        );
      }

      function closeModal() {
        document.getElementById("modal-overlay").classList.remove("open");
        document.getElementById("task-desc-input").value = "";
        document.getElementById("task-name-input").value = "";
        document.getElementById("agent-input").value = "@auto";
      }

      // ═══════════════════════════════════════════════════════════════════
      // Timeline
      // ═══════════════════════════════════════════════════════════════════
      const TL_TRACKS = [
        {
          label: "Messages",
          types: new Set([
            "user_message",
            "user_message_queued",
            "response",
            "stream_live",
            "ask_user",
            "confirm_request",
          ]),
        },
        { label: "Tools", types: new Set(["tool_use", "tool_result"]) },
        { label: "Files", types: new Set(["file_op"]) },
        { label: "Thinking", types: new Set(["thinking"]) },
        { label: "System", types: new Set(["info", "error"]) },
      ];
      const TL_TYPE_TRACK = {};
      TL_TRACKS.forEach((t, i) =>
        t.types.forEach((type) => (TL_TYPE_TRACK[type] = i)),
      );

      const TL_CLIP_CLASS = {
        user_message: "clip-user",
        user_message_queued: "clip-user",
        response: "clip-response",
        stream_live: "clip-stream",
        ask_user: "clip-ask",
        confirm_request: "clip-ask",
        tool_use: "clip-tool",
        tool_result: "clip-tool",
        file_op: "clip-file",
        thinking: "clip-thinking",
        info: "clip-info",
        error: "clip-error",
      };
      const TL_ICONS = {
        user_message: "💬",
        user_message_queued: "📩",
        response: "🤖",
        stream_live: "📡",
        ask_user: "⚡",
        confirm_request: "⚠",
        tool_use: "🔧",
        tool_result: "✓",
        file_op: "📁",
        thinking: "🧠",
        info: "ℹ",
        error: "⚠",
      };
      const TL_TYPE_COLORS = {
        "clip-user": "#7c8fff",
        "clip-response": "#3ecf8e",
        "clip-tool": "#a78bfa",
        "clip-file": "#f59e0b",
        "clip-thinking": "#555",
        "clip-info": "#444",
        "clip-error": "#ef4444",
        "clip-ask": "#f59e0b",
        "clip-stream": "#60a5fa",
      };
      const TL_CLIP_W = 88; // px per event slot
      const TL_TRACK_H = 40;

      function tlFor(id) {
        if (!state.taskTimeline[id])
          state.taskTimeline[id] = {
            events: [],
            playIdx: -1,
            playing: false,
            playTimer: null,
            speed: 1,
          };
        return state.taskTimeline[id];
      }

      function _tlCurrentSources(id) {
        if (!state.taskCurrentSources[id]) state.taskCurrentSources[id] = [];
        return state.taskCurrentSources[id];
      }

      // Update a single clip's DOM element in-place (type, label, class)
      function _tlUpdateClip(id, evtIdx) {
        const tracks = document.getElementById("tl-tracks-" + id);
        if (!tracks) return;
        const clipEl = tracks.querySelector(
          `.tl-clip[data-evt-idx="${evtIdx}"]`,
        );
        if (!clipEl) return;
        const tl = tlFor(id);
        const evt = tl.events[evtIdx];
        if (!evt) return;
        const cls = TL_CLIP_CLASS[evt.type] || "clip-info";
        clipEl.className =
          "tl-clip " + cls + (tl.playIdx === evtIdx ? " selected" : "");
        const icon = TL_ICONS[evt.type] || "•";
        const label = _tlClipLabel(evt);
        clipEl.innerHTML = `<span class="tl-clip-icon">${icon}</span><span class="tl-clip-text">${esc(label)}</span>`;
        clipEl.title = label;
        // If this is the selected event, refresh detail panel
        if (
          id === state.activeId &&
          tl.playIdx === evtIdx &&
          currentTab === "timeline"
        ) {
          _tlRenderDetail(id, evtIdx);
        }
      }

      function addTimelineEvent(id, type, data) {
        const tl = tlFor(id);
        tl.events.push({ type, data: { ...data }, ts: data.ts || _ts() });
        updateTabBadges(id);
        if (id === state.activeId && currentTab === "timeline")
          _tlRefreshLive(id);
      }

      function _tlRefreshLive(id) {
        // Lightweight append: re-render if open
        renderTimelineTab(id);
      }

      function _tlClipLabel(evt) {
        const d = evt.data;
        if (evt.type === "stream_live") {
          const srcN = d.sources?.length || 0;
          const preview = (d.text || "").trim().slice(0, 22);
          return (preview || "streaming…") + (srcN ? ` [${srcN} src]` : "");
        }
        if (evt.type === "response") {
          const srcN = d.sources?.length || 0;
          const preview = String(d.text || "")
            .trim()
            .slice(0, 22);
          return preview + (srcN ? ` · ${srcN} src` : "");
        }
        if (evt.type === "tool_use" || evt.type === "tool_result")
          return d.name || evt.type;
        if (evt.type === "file_op")
          return (d.op || "") + " " + (d.path || "").split(/[\\/]/).pop();
        if (d.text) return String(d.text).slice(0, 28);
        if (d.message) return String(d.message).slice(0, 28);
        if (d.question) return String(d.question).slice(0, 28);
        return evt.type;
      }

      function renderTimelineTab(id) {
        const wrap = document.getElementById("tab-timeline");
        if (!wrap) return;
        wrap.innerHTML = "";
        const tl = tlFor(id);
        const events = tl.events;

        if (!events.length) {
          const empty = document.createElement("div");
          empty.className = "tl-empty";
          empty.innerHTML =
            '<div style="font-size:32px;opacity:.15">🎬</div><div>No events yet — start a task to record the timeline</div>';
          wrap.appendChild(empty);
          return;
        }

        // ── Controls bar ────────────────────────────────────────────────────────────
        const ctrl = document.createElement("div");
        ctrl.className = "tl-controls";
        ctrl.innerHTML = `
    <button class="tl-btn tl-play-btn" title="Play / Pause">▶</button>
    <button class="tl-btn" id="tl-step-back" title="Step back">◀</button>
    <button class="tl-btn" id="tl-step-fwd" title="Step forward">▶</button>
    <div class="tl-sep"></div>
    <span class="tl-time" id="tl-time-${id}">— / ${events.length}</span>
    <div style="flex:1"></div>
    <span class="tl-total-label">${events.length} events · ${TL_TRACKS.length} tracks</span>
    <span class="tl-speed" id="tl-speed-${id}" title="Playback speed">${tl.speed}x</span>
  `;
        wrap.appendChild(ctrl);

        // ── Body: labels + canvas ───────────────────────────────────────────────────
        const body = document.createElement("div");
        body.className = "tl-body";

        // Labels column
        const labels = document.createElement("div");
        labels.className = "tl-labels";
        const rulerSpacer = document.createElement("div");
        rulerSpacer.className = "tl-labels-ruler-spacer";
        labels.appendChild(rulerSpacer);
        TL_TRACKS.forEach((t) => {
          const lbl = document.createElement("div");
          lbl.className = "tl-track-label";
          lbl.textContent = t.label;
          labels.appendChild(lbl);
        });
        body.appendChild(labels);

        // Canvas wrap
        const canvasWrap = document.createElement("div");
        canvasWrap.className = "tl-canvas-wrap";
        canvasWrap.id = "tl-canvas-" + id;

        const totalW = Math.max(
          events.length * TL_CLIP_W + 120,
          canvasWrap.offsetWidth || 600,
        );

        // Ruler
        const ruler = document.createElement("div");
        ruler.className = "tl-ruler";
        ruler.style.width = totalW + "px";
        ruler.id = "tl-ruler-" + id;
        for (let i = 0; i <= events.length; i++) {
          const x = i * TL_CLIP_W;
          const major = i % 5 === 0;
          if (major || i % 2 === 0) {
            const tick = document.createElement("div");
            tick.className = "tl-ruler-tick " + (major ? "major" : "minor");
            tick.style.left = x + "px";
            ruler.appendChild(tick);
          }
          if (major && i > 0) {
            const lbl = document.createElement("span");
            lbl.className = "tl-ruler-label";
            lbl.style.left = x + "px";
            lbl.textContent = i;
            ruler.appendChild(lbl);
          }
        }
        ruler.addEventListener("click", (e) => {
          const rect = ruler.getBoundingClientRect();
          const x = e.clientX - rect.left + canvasWrap.scrollLeft;
          const idx = Math.max(
            0,
            Math.min(Math.floor(x / TL_CLIP_W), events.length - 1),
          );
          tlSeekTo(id, idx);
        });
        canvasWrap.appendChild(ruler);

        // Tracks + clips
        const tracksEl = document.createElement("div");
        tracksEl.className = "tl-tracks";
        tracksEl.style.width = totalW + "px";
        tracksEl.style.position = "relative";
        tracksEl.id = "tl-tracks-" + id;

        const trackEls = TL_TRACKS.map((_, ti) => {
          const el = document.createElement("div");
          el.className = "tl-track";
          el.style.width = totalW + "px";
          tracksEl.appendChild(el);
          return el;
        });

        // Place clips
        events.forEach((evt, ei) => {
          const ti = TL_TYPE_TRACK[evt.type];
          if (ti === undefined) return;
          const clip = document.createElement("div");
          clip.className =
            "tl-clip " + (TL_CLIP_CLASS[evt.type] || "clip-info");
          if (ei === tl.playIdx) clip.classList.add("selected");
          clip.style.left = ei * TL_CLIP_W + 2 + "px";
          clip.style.width = TL_CLIP_W - 4 + "px";
          clip.dataset.evtIdx = ei;
          const icon = TL_ICONS[evt.type] || "•";
          const label = _tlClipLabel(evt);
          clip.innerHTML = `<span class="tl-clip-icon">${icon}</span><span class="tl-clip-text">${esc(label)}</span>`;
          clip.title = label;
          clip.addEventListener("click", () => tlSeekTo(id, ei));
          trackEls[ti].appendChild(clip);
        });

        // Playhead
        const ph = document.createElement("div");
        ph.className = "tl-playhead";
        ph.id = "tl-playhead-" + id;
        ph.style.height = TL_TRACKS.length * TL_TRACK_H + "px";
        const phHead = document.createElement("div");
        phHead.className = "tl-playhead-head";
        ph.appendChild(phHead);
        if (tl.playIdx >= 0) {
          ph.style.left = tl.playIdx * TL_CLIP_W + "px";
          ph.style.display = "block";
        } else {
          ph.style.display = "none";
        }
        tracksEl.appendChild(ph);

        canvasWrap.appendChild(tracksEl);
        body.appendChild(canvasWrap);
        wrap.appendChild(body);

        // ── Detail panel ─────────────────────────────────────────────────────────────
        const detail = document.createElement("div");
        detail.className = "tl-detail";
        detail.id = "tl-detail-" + id;
        detail.innerHTML = `<div class="tl-detail-header"><span class="tl-detail-type" style="color:#282828">Click a clip or press Play</span></div><div class="tl-detail-body" style="color:#222;font-style:italic">The selected event's details will appear here…</div>`;
        wrap.appendChild(detail);
        if (tl.playIdx >= 0) _tlRenderDetail(id, tl.playIdx);

        // Wire controls
        ctrl.querySelector(".tl-play-btn").textContent = tl.playing ? "⏸" : "▶";
        if (tl.playing)
          ctrl.querySelector(".tl-play-btn").classList.add("active");
        ctrl
          .querySelector(".tl-play-btn")
          .addEventListener("click", () => tlTogglePlay(id));
        ctrl.querySelector("#tl-step-back").addEventListener("click", () => {
          tlStopPlay(id);
          tlSeekTo(id, Math.max(0, tl.playIdx - 1));
        });
        ctrl.querySelector("#tl-step-fwd").addEventListener("click", () => {
          tlStopPlay(id);
          tlSeekTo(id, Math.min(events.length - 1, tl.playIdx + 1));
        });
        const speedEl = ctrl.querySelector("#tl-speed-" + id);
        speedEl.addEventListener("click", () => {
          const speeds = [0.5, 1, 2, 4];
          const cur = speeds.indexOf(tl.speed);
          tl.speed = speeds[(cur + 1) % speeds.length];
          speedEl.textContent = tl.speed + "x";
        });

        if (tl.playIdx >= 0) _tlUpdateTime(id);
      }

      function tlSeekTo(id, idx) {
        const tl = tlFor(id);
        if (!tl.events.length) return;
        idx = Math.max(0, Math.min(idx, tl.events.length - 1));
        tl.playIdx = idx;

        // Move playhead
        const ph = document.getElementById("tl-playhead-" + id);
        if (ph) {
          ph.style.display = "block";
          ph.style.left = idx * TL_CLIP_W + "px";
          // Scroll playhead into view
          const cw = document.getElementById("tl-canvas-" + id);
          if (cw) {
            const x = idx * TL_CLIP_W;
            const viewL = cw.scrollLeft,
              viewR = viewL + cw.clientWidth;
            if (x < viewL + 40) cw.scrollLeft = Math.max(0, x - 60);
            else if (x > viewR - 80) cw.scrollLeft = x - cw.clientWidth / 2;
          }
        }

        // Highlight selected clip
        const tracks = document.getElementById("tl-tracks-" + id);
        if (tracks) {
          tracks.querySelectorAll(".tl-clip").forEach((c) => {
            c.classList.toggle("selected", +c.dataset.evtIdx === idx);
          });
        }

        _tlUpdateTime(id);
        _tlRenderDetail(id, idx);
      }

      function _tlUpdateTime(id) {
        const tl = tlFor(id);
        const el = document.getElementById("tl-time-" + id);
        if (el) el.textContent = `${tl.playIdx + 1} / ${tl.events.length}`;
      }

      function _tlRenderDetail(id, idx) {
        const tl = tlFor(id);
        const evt = tl.events[idx];
        if (!evt) return;
        const detail = document.getElementById("tl-detail-" + id);
        if (!detail) return;

        const cls = TL_CLIP_CLASS[evt.type] || "clip-info";
        const color = TL_TYPE_COLORS[cls] || "#888";
        const icon = TL_ICONS[evt.type] || "•";
        const d = evt.data;

        let body = "";
        if (evt.type === "tool_use") {
          body =
            (d.name || "") + "\n\n" + JSON.stringify(d.params || {}, null, 2);
        } else if (evt.type === "tool_result") {
          body = (d.name || "") + " → result\n\n" + (d.result || "");
        } else if (evt.type === "file_op") {
          body = `${(d.op || "").toUpperCase()}  ${d.path || ""}\ntool: ${d.tool || ""}`;
        } else if (d.text) {
          body = d.text;
        } else if (d.question) {
          body =
            "❓ " +
            d.question +
            (d.options?.length ? "\n\nOptions: " + d.options.join(", ") : "");
        } else if (d.message) {
          body = d.message;
        } else {
          body = JSON.stringify(d, null, 2);
        }

        const typeName = evt.type.replace(/_/g, " ").toUpperCase();

        // Sources panel (response / stream_live events)
        const sources = d.sources || [];
        let sourcesHtml = "";
        if (sources.length) {
          const rows = sources
            .map((s) => {
              if (s.type === "file_op") {
                return `<div class="tl-source-row"><span class="tl-source-icon">📁</span><span class="tl-source-name">${esc(s.op || "file")}</span><span class="tl-source-meta">${esc(s.path || "")}</span></div>`;
              }
              const summary = _toolSummary(s.name, s.params || {});
              return `<div class="tl-source-row"><span class="tl-source-icon">🔧</span><span class="tl-source-name">${esc(s.name)}</span><span class="tl-source-meta">${esc(summary)}</span></div>`;
            })
            .join("");
          sourcesHtml = `<div class="tl-sources"><div class="tl-sources-title">Knowledge Sources (${sources.length})</div>${rows}</div>`;
        }

        const streamNote =
          evt.type === "stream_live"
            ? `<div style="font-size:10px;color:#2a4a6a;margin-bottom:6px;font-family:sans-serif;animation:tl-pulse .8s ease-in-out infinite">● Streaming…</div>`
            : "";

        detail.innerHTML = `
    <div class="tl-detail-header">
      <span class="tl-detail-type-icon">${icon}</span>
      <span class="tl-detail-type" style="color:${color}">${typeName}</span>
      <span class="tl-detail-idx">#${idx + 1}</span>
      <span class="tl-detail-ts">${evt.ts}</span>
    </div>
    <div class="tl-detail-body">${streamNote}${esc(body.slice(0, 1200))}</div>
    ${sourcesHtml ? `<div style="padding:6px 14px 10px;background:#090909;flex-shrink:0;border-top:1px solid #141414">${sourcesHtml}</div>` : ""}
  `;
      }

      function tlTogglePlay(id) {
        const tl = tlFor(id);
        if (tl.playing) tlStopPlay(id);
        else tlStartPlay(id);
      }

      function tlStartPlay(id) {
        const tl = tlFor(id);
        if (tl.playIdx >= tl.events.length - 1) tl.playIdx = -1;
        tl.playing = true;
        const wrap = document.getElementById("tab-timeline");
        const btn = wrap?.querySelector(".tl-play-btn");
        if (btn) {
          btn.textContent = "⏸";
          btn.classList.add("active");
        }

        const interval = () => Math.max(150, 600 / (tl.speed || 1));
        const step = () => {
          if (!tl.playing) return;
          const next = tl.playIdx + 1;
          if (next >= tl.events.length) {
            tlStopPlay(id);
            return;
          }
          tlSeekTo(id, next);
          tl.playTimer = setTimeout(step, interval());
        };
        tl.playTimer = setTimeout(step, interval());
      }

      function tlStopPlay(id) {
        if (!state.taskTimeline[id]) return;
        const tl = state.taskTimeline[id];
        tl.playing = false;
        if (tl.playTimer) {
          clearTimeout(tl.playTimer);
          tl.playTimer = null;
        }
        const wrap = document.getElementById("tab-timeline");
        const btn = wrap?.querySelector(".tl-play-btn");
        if (btn) {
          btn.textContent = "▶";
          btn.classList.remove("active");
        }
      }

      // ═══════════════════════════════════════════════════════════════════
      // Init
      // ═══════════════════════════════════════════════════════════════════
      document.getElementById("btn-new").addEventListener("click", openModal);
      document
        .getElementById("btn-create-task")
        .addEventListener("click", createTask);
      document
        .getElementById("btn-cancel-modal")
        .addEventListener("click", closeModal);
      document
        .getElementById("modal-overlay")
        .addEventListener("click", (e) => {
          if (e.target === document.getElementById("modal-overlay"))
            closeModal();
        });
      document
        .getElementById("task-desc-input")
        .addEventListener("keydown", (e) => {
          if (e.key === "Enter" && e.ctrlKey) createTask();
        });
      document.getElementById("btn-stop").addEventListener("click", stopTask);
      document
        .getElementById("btn-followup")
        .addEventListener("click", sendFollowup);

      const fInput = document.getElementById("followup-input");
      fInput.addEventListener("input", () => autoResize(fInput));
      fInput.addEventListener("keydown", (e) => {
        if (e.key === "Enter" && !e.shiftKey) {
          e.preventDefault();
          sendFollowup();
        }
      });

      loadTasks();
    </script>
  </body>
</html>
